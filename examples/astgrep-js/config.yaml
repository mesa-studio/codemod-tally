name: console-to-logger-astgrep
description: Replace console.log calls found by ast-grep
detector: detector.yaml
recipe: recipe.md
examples_dir: examples/
scope:
  include: ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx"]
  exclude: ["**/*.test.js", "**/*.spec.js", "**/node_modules/**", "**/dist/**"]
